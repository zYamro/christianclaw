title: Telegram current-session status tool context

scenario:
  id: telegram-current-session-status-tool
  surface: channel-framework
  category: channel-framework.channel-actions-commands-and-approvals
  coverage:
    primary: [tools.session-status]
    secondary: [memory.session-key-construction]
  objective: Verify the session_status tool resolves current to the active Telegram group session.
  successCriteria:
    - The model calls session_status with sessionKey current.
    - The final reply contains the Telegram group session key and success marker.
  codeRefs:
    - src/agents/tools/session-status-tool.ts
    - extensions/qa-lab/src/live-transports/telegram/adapter.runtime.ts
  execution:
    kind: flow
    channel: telegram
    summary: Ask the model to resolve the current Telegram group session through session_status.
    config:
      requiredChannelDriver: live
      requiredProviderMode: mock-openai

flow:
  steps:
    - name: session status resolves current Telegram group
      actions:
        - resetTransport: true
        - sendInbound:
            conversation: { id: telegram-command-room, kind: channel }
            senderId: qa-command-operator
            senderName: QA Command Operator
            text: "@openclaw Telegram current session_status QA check. Call session_status with sessionKey set to current, then reply with the exact QA marker and resolved session key."
        - waitForOutbound:
            conversation: { id: telegram-command-room, kind: channel }
            textIncludes: QA-TELEGRAM-CURRENT-SESSION-OK
            timeoutMs: 90000
          saveAs: reply
        - assert:
            expr: "reply.text.includes(':telegram:group:')"
            message:
              expr: "`current-session reply missing Telegram group key: ${reply.text}`"
      detailsExpr: reply.text
