<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 320px;
        margin: 0;
        padding: 14px;
        background: #1c1c1e;
        color: #f2f2f7;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #6b7280;
      }
      .dot.on { background: #34c759; }
      .dot.connecting { background: #f59e0b; }
      .dot.error { background: #ff3b30; }
      p { font-size: 12px; color: #98989f; margin: 6px 0; }
      textarea {
        width: 100%;
        box-sizing: border-box;
        background: #2c2c2e;
        color: #f2f2f7;
        border: 1px solid #3a3a3c;
        border-radius: 6px;
        font-family: ui-monospace, monospace;
        font-size: 11px;
        min-height: 52px;
        resize: vertical;
      }
      button {
        margin-top: 8px;
        width: 100%;
        padding: 7px 10px;
        border-radius: 6px;
        border: none;
        font-size: 13px;
        cursor: pointer;
        background: #ff5a36;
        color: white;
      }
      button.secondary {
        background: #3a3a3c;
        color: #f2f2f7;
      }
      .hidden { display: none; }
      #error { color: #ff453a; }
    </style>
  </head>
  <body>
    <h1><span id="statusDot" class="dot"></span>OpenClaw</h1>
    <div id="pairSection">
      <p>
        Run <code>openclaw browser extension pair</code> on this machine and
        paste the pairing string:
      </p>
      <textarea id="pairingString" placeholder="ws://127.0.0.1:18797/extension#…"></textarea>
      <p id="error" class="hidden"></p>
      <button id="pairButton">Pair</button>
    </div>
    <div id="connectedSection" class="hidden">
      <p id="statusLine"></p>
      <button id="shareButton"></button>
      <button id="unpairButton" class="secondary">Unpair</button>
    </div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
