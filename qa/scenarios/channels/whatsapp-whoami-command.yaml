title: WhatsApp whoami command reply

scenario:
  id: whatsapp-whoami-command
  surface: channel-framework
  category: channel-framework.channel-actions-commands-and-approvals
  coverage:
    primary: [channels.native-commands]
  objective: Verify WhatsApp command identity includes channel and allowlist context.
  successCriteria:
    - The whoami command returns an identity block.
    - The reply names WhatsApp and includes AllowFrom context.
  codeRefs:
    - src/auto-reply/reply/commands-whoami.ts
    - extensions/qa-lab/src/live-transports/whatsapp/adapter.runtime.ts
  execution:
    kind: flow
    channel: whatsapp
    config:
      requiredChannelDriver: live
      requiredProviderMode: mock-openai
      expectedAny: [Identity, "Channel: whatsapp", "AllowFrom:"]
    summary: Run WhatsApp whoami and verify channel identity context.

flow:
  steps:
    - name: whoami includes WhatsApp identity
      actions:
        - resetTransport: true
        - sendInbound:
            conversation: { id: whatsapp-command-dm, kind: direct }
            senderId: qa-command-operator
            senderName: QA Command Operator
            text: /whoami
        - waitForOutbound:
            conversation: { id: whatsapp-command-dm, kind: direct }
            textIncludes: Identity
            timeoutMs: 60000
          saveAs: reply
        - assert:
            expr: "config.expectedAny.every((needle) => reply.text.includes(needle))"
            message:
              expr: "`whoami reply missing expected text: ${reply.text}`"
      detailsExpr: reply.text
